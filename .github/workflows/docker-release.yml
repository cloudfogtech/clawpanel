name: Docker Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

env:
  DOCKERHUB_REPO: ${{ vars.DOCKERHUB_USERNAME }}/clawpanel
  GHCR_REPO: ghcr.io/${{ github.repository_owner }}/clawpanel

jobs:
  docker:
    name: Build & Push Multi-Arch Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: release

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push multi-platform images
        run: |
          set -eux
          PLATFORMS="linux/amd64,linux/arm64"

          docker buildx build \
            --platform "${PLATFORMS}" \
            -t "${DOCKERHUB_REPO}:latest" \
            -t "${GHCR_REPO}:latest" \
            -f "Dockerfile.release" \
            --push \
            .

      - name: Inspect manifests
        run: |
          set -eux
          docker buildx imagetools inspect ${DOCKERHUB_REPO}:latest || true